services:
  postgres:
    image: postgres:16-alpine
    container_name: bookmarks-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookmarks
    ports:
      - "5432:5432"
    volumes:
      - bookmarks-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookmarks"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookmarks-pgdata:
